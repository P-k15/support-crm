<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ticket Detail - Support CRM</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

<header class="bg-white border-b border-slate-200 sticky top-0 z-10">
  <div class="max-w-3xl mx-auto px-4 py-4 flex items-center gap-3">
    <a href="/" class="text-slate-500 hover:text-slate-700 text-sm">&larr; Back</a>
    <h1 class="text-lg font-semibold text-slate-800">Ticket Detail</h1>
  </div>
</header>

<main class="max-w-3xl mx-auto px-4 py-6 flex-1 w-full">
  <div id="loading" class="text-slate-400 text-sm">Loading ticket...</div>
  <div id="notFound" class="hidden text-slate-500 text-sm">Ticket not found.</div>

  <div id="content" class="hidden space-y-6">
    <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
      <div class="flex items-start justify-between">
        <div>
          <p class="text-xs text-slate-400 font-medium" id="ticketIdLabel"></p>
          <h2 class="text-xl font-semibold text-slate-800 mt-1" id="subjectLabel"></h2>
        </div>
        <span id="statusBadge" class="text-xs font-medium px-3 py-1 rounded-full"></span>
      </div>
      <div class="grid grid-cols-2 gap-4 mt-4 text-sm">
        <div>
          <p class="text-xs text-slate-400">Customer</p>
          <p class="text-slate-700" id="nameLabel"></p>
        </div>
        <div>
          <p class="text-xs text-slate-400">Email</p>
          <p class="text-slate-700" id="emailLabel"></p>
        </div>
        <div>
          <p class="text-xs text-slate-400">Created</p>
          <p class="text-slate-700" id="createdLabel"></p>
        </div>
        <div>
          <p class="text-xs text-slate-400">Last Updated</p>
          <p class="text-slate-700" id="updatedLabel"></p>
        </div>
      </div>
      <div class="mt-4">
        <p class="text-xs text-slate-400 mb-1">Description</p>
        <p class="text-slate-700 text-sm whitespace-pre-wrap" id="descLabel"></p>
      </div>
    </div>

    <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
      <h3 class="text-sm font-semibold text-slate-700 mb-3">Update Status</h3>
      <div class="flex gap-2">
        <select id="statusSelect" class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Closed">Closed</option>
        </select>
        <button id="statusSaveBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg">Save</button>
      </div>
    </div>

    <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
      <h3 class="text-sm font-semibold text-slate-700 mb-3">Notes / Comments</h3>
      <div id="notesList" class="space-y-3 mb-4"></div>
      <div class="flex gap-2">
        <input id="noteInput" placeholder="Add a note..." class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <button id="addNoteBtn" class="bg-slate-800 hover:bg-slate-900 text-white text-sm font-medium px-4 py-2 rounded-lg">Add</button>
      </div>
    </div>
  </div>
</main>

<footer class="mt-12 border-t border-slate-200 bg-white">
  <div class="max-w-6xl mx-auto px-4 py-5 flex flex-col sm:flex-row justify-between items-center text-sm text-slate-500">
    <p>
      © 2026 Support CRM. All rights reserved.
    </p>
    <p class="mt-2 sm:mt-0">
      Built with ❤️ by
      <span class="font-semibold text-slate-700">Piyush Waghmare</span>
      using FastAPI, SQLite & Tailwind CSS
    </p>
  </div>
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const ticketId = params.get('id');

function statusClass(status) {
  if (status === 'Open') return 'bg-blue-100 text-blue-700';
  if (status === 'In Progress') return 'bg-amber-100 text-amber-700';
  if (status === 'Closed') return 'bg-green-100 text-green-700';
  return 'bg-slate-100 text-slate-600';
}

function formatDateTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

async function loadTicket() {
  if (!ticketId) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('notFound').classList.remove('hidden');
    return;
  }
  const res = await fetch(`/api/tickets/${encodeURIComponent(ticketId)}`);
  document.getElementById('loading').classList.add('hidden');

  if (!res.ok) {
    document.getElementById('notFound').classList.remove('hidden');
    return;
  }

  const t = await res.json();
  document.getElementById('content').classList.remove('hidden');
  document.getElementById('ticketIdLabel').textContent = t.ticket_id;
  document.getElementById('subjectLabel').textContent = t.subject;
  document.getElementById('nameLabel').textContent = t.customer_name;
  document.getElementById('emailLabel').textContent = t.customer_email;
  document.getElementById('createdLabel').textContent = formatDateTime(t.created_at);
  document.getElementById('updatedLabel').textContent = formatDateTime(t.updated_at);
  document.getElementById('descLabel').textContent = t.description;

  const badge = document.getElementById('statusBadge');
  badge.textContent = t.status;
  badge.className = `text-xs font-medium px-3 py-1 rounded-full ${statusClass(t.status)}`;

  document.getElementById('statusSelect').value = t.status;

  const notesList = document.getElementById('notesList');
  notesList.innerHTML = '';
  if (t.notes.length === 0) {
    notesList.innerHTML = '<p class="text-xs text-slate-400">No notes yet.</p>';
  } else {
    for (const n of t.notes) {
      const div = document.createElement('div');
      div.className = 'border border-slate-100 bg-slate-50 rounded-lg p-3 text-sm';
      div.innerHTML = `<p class="text-slate-700">${n.note_text}</p><p class="text-xs text-slate-400 mt-1">${formatDateTime(n.created_at)}</p>`;
      notesList.appendChild(div);
    }
  }
}

document.getElementById('statusSaveBtn').onclick = async () => {
  const status = document.getElementById('statusSelect').value;
  await fetch(`/api/tickets/${encodeURIComponent(ticketId)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status }),
  });
  loadTicket();
};

document.getElementById('addNoteBtn').onclick = async () => {
  const input = document.getElementById('noteInput');
  if (!input.value.trim()) return;
  await fetch(`/api/tickets/${encodeURIComponent(ticketId)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ notes: input.value.trim() }),
  });
  input.value = '';
  loadTicket();
};

loadTicket();
</script>
</body>
</html>
